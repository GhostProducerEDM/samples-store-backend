<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://gpe-samples-backend.onrender.com';
const SUPABASE_URL  = 'https://rxhcjwmlvftlqpkgjnwo.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4aGNqd21sdmZ0bHFwa2dqbndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjY5NzUsImV4cCI6MjA4OTYwMjk3NX0.pyADAIhwVd0wKParzyiWpg2NJud6YDtrmAPtphRKauA';
window._supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let currentUser = null;

// ── NAV AUTH ──────────────────────────────────────────────────────────────
function updateNavAuth(user) {
  currentUser = user;
  const credEl = document.getElementById('nav-credits');
  const logoutBtn = document.getElementById('nav-logout-btn');
  if (user) {
    logoutBtn.style.display = '';
    fetch(API + '/api/profile', { headers: { Authorization: 'Bearer ' + (window._authToken||'') } })
      .then(r => r.json()).then(p => {
        if (p.credits != null) { credEl.textContent = p.credits + ' credits'; credEl.classList.remove('hidden'); }
      }).catch(() => {});
  } else {
    credEl.classList.add('hidden');
    logoutBtn.style.display = 'none';
  }
}
function handleNavAccount() {
  if (currentUser) window.location.href = 'library.html';
  else openAuth(() => updateNavAuth(currentUser));
}
async function handleNavLogout() {
  await window._supabase.auth.signOut(); updateNavAuth(null);
}
window.onUserLoggedIn = u => updateNavAuth(u);
window._supabase.auth.onAuthStateChange((_, s) => {
  window._authToken = s?.access_token || ''; updateNavAuth(s?.user || null);
});

// ── HELPERS ───────────────────────────────────────────────────────────────
const packHref = n => `/pack/${encodeURIComponent(n)}`;

function initials(name) {
  return name.split(' ').slice(0,2).map(w => (w[0]||'').toUpperCase()).join('');
}

function coverEl(src, name, cls = '') {
  if (src) return `<img src="${src}" alt="${name}" class="${cls} w-full h-full object-cover" loading="lazy"
    onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'w-full h-full flex items-center justify-center text-2xl font-black text-on-surface-variant/30',textContent:'${initials(name)}'}))">`;
  return `<div class="w-full h-full flex items-center justify-center text-2xl font-black text-on-surface-variant/30">${initials(name)}</div>`;
}

function relDate(iso) {
  if (!iso) return '';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (d === 0) return 'Today'; if (d === 1) return 'Yesterday';
  if (d < 7) return d + 'd ago'; if (d < 30) return Math.floor(d/7) + 'w ago';
  return new Date(iso).toLocaleDateString('en-US', {month:'short', year:'numeric'});
}

// ── RENDER: SPOTLIGHT ─────────────────────────────────────────────────────
function renderSpotlight(pack, covers) {
  const el = document.getElementById('spotlight');
  if (!pack) { el.style.display = 'none'; return; }
  const name  = pack.pack_name;
  const cover = covers[name] || '';
  const price = pack.price_usd > 0 ? `$${pack.price_usd}` : 'Free';
  const words = name.split(' ');
  const line1 = words.slice(0, -1).join(' ') || name;
  const line2 = words.length > 1 ? words[words.length - 1] : '';
  el.classList.remove('skeleton');
  el.className = 'relative w-full h-[560px] rounded-3xl overflow-hidden group cursor-pointer';
  el.innerHTML = `
    ${cover
      ? `<div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-105" style="background-image:url('${cover}')"></div>`
      : `<div class="absolute inset-0 bg-gradient-to-br from-surface-container-high to-surface-container-lowest"></div>`}
    <div class="absolute inset-0 bg-gradient-to-r from-[#131313] via-[#131313]/50 to-transparent"></div>
    <div class="absolute inset-0 flex flex-col justify-center px-16 gap-5">
      <div class="inline-flex items-center px-3 py-1 bg-primary text-on-primary text-[10px] font-bold tracking-widest uppercase rounded-full w-max">
        New Release Spotlight
      </div>
      <h1 class="text-6xl md:text-7xl font-black tracking-tighter leading-none uppercase max-w-2xl">
        ${line1}<br><span class="text-primary italic">${line2}</span>
      </h1>
      ${pack.bonus_credits ? `<p class="text-on-surface-variant text-base max-w-md">Includes <span class="text-secondary font-bold">${pack.bonus_credits} bonus credits</span></p>` : ''}
      <div class="flex items-center gap-4 pt-2">
        <a href="${packHref(name)}" class="bg-gradient-to-br from-primary to-primary-container text-on-primary-container px-8 py-4 rounded-full font-bold uppercase tracking-widest text-xs active:scale-95 transition-all shadow-lg shadow-primary/20">
          Get This Pack · ${price}
        </a>
        <a href="${packHref(name)}" class="bg-surface-container-highest/40 backdrop-blur-md text-on-surface px-8 py-4 rounded-full font-bold uppercase tracking-widest text-xs border border-outline-variant/20 active:scale-95 transition-all">
          View Tracklist
        </a>
      </div>
    </div>`;
}

// ── RENDER: LATEST RELEASES ───────────────────────────────────────────────
function renderLatest(packs, covers) {
  const grid    = document.getElementById('latest-grid');
  const sub     = document.getElementById('latest-sub');
  const viewAll = document.getElementById('view-all-btn');
  const MAX = 12;

  if (!packs.length) {
    grid.innerHTML = '<p class="col-span-6 text-center text-on-surface-variant py-16 text-sm">No packs yet.</p>';
    sub.textContent = '0 packs'; return;
  }

  const shown = packs.slice(0, MAX);
  grid.innerHTML = shown.map(p => {
    const dateStr  = relDate(p.created_at);
    const priceStr = p.price_usd > 0 ? `$${p.price_usd}` : p.price_usd === 0 ? 'Free' : '';
    const meta     = [priceStr, dateStr].filter(Boolean).join(' · ');
    return `
    <div class="pack-card space-y-3 group cursor-pointer">
      <a href="${packHref(p.pack_name)}" class="block relative aspect-square rounded-2xl overflow-hidden bg-surface-container-low editorial-shadow">
        ${coverEl(covers[p.pack_name], p.pack_name, 'pack-cover')}
        <div class="pack-overlay absolute inset-0 bg-black/40 flex items-center justify-center">
          <div class="w-14 h-14 bg-primary-fixed rounded-full flex items-center justify-center shadow-xl">
            <span class="material-symbols-outlined ms-filled text-on-primary-fixed text-3xl">play_arrow</span>
          </div>
        </div>
      </a>
      <div>
        <a href="${packHref(p.pack_name)}" class="font-bold text-sm tracking-tight hover:text-primary transition-colors block truncate">${p.pack_name}</a>
        ${meta ? `<p class="text-on-surface-variant text-[10px] uppercase tracking-widest font-semibold mt-0.5">${meta}</p>` : ''}
      </div>
    </div>`;
  }).join('');

  const d = packs[0]?.created_at ? new Date(packs[0].created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : null;
  sub.textContent = d ? `Updated ${d} · ${packs.length} packs` : `${packs.length} packs`;

  if (packs.length > MAX) viewAll.style.display = '';
}

// ── RENDER: TRENDING ──────────────────────────────────────────────────────
function fmtNum(n) {
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return String(n);
}

function renderTrending(packs, covers) {
  const grid = document.getElementById('trending-grid');
  if (!packs.length) { grid.closest('section').style.display = 'none'; return; }

  const accents = ['text-primary','text-secondary','text-primary','text-tertiary','text-primary'];
  const nums    = ['01','02','03','04','05'];
  const shown   = packs.slice(0, 5);

  grid.innerHTML = shown.map((p, i) => {
    const bg = covers[p.name]
      ? `<img src="${covers[p.name]}" alt="${p.name}" class="bento-img absolute inset-0 w-full h-full object-cover">`
      : `<div class="absolute inset-0 bg-gradient-to-br from-surface-container-high to-surface-container"></div>`;

    const statsHTML = (p.plays > 0 || p.downloads > 0) ? `
      <div class="flex items-center gap-3 mt-1">
        ${p.plays > 0 ? `<span class="text-xs text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-sm">headphones</span>${fmtNum(p.plays)}</span>` : ''}
        ${p.downloads > 0 ? `<span class="text-xs text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-sm">download</span>${fmtNum(p.downloads)}</span>` : ''}
      </div>` : '';

    if (i === 0) return `
      <a href="${packHref(p.name)}" class="bento-card col-span-2 row-span-2 bg-surface-container-low rounded-3xl overflow-hidden relative group cursor-pointer block">
        ${bg}
        <div class="absolute inset-0 bg-gradient-to-t from-[#131313] via-[#131313]/20 to-transparent"></div>
        <div class="absolute bottom-10 left-10 space-y-1">
          <div class="${accents[0]} font-black text-6xl tracking-tighter">${nums[0]}</div>
          <h3 class="text-3xl font-bold tracking-tight">${p.name}</h3>
          ${statsHTML}
        </div>
      </a>`;

    return `
      <a href="${packHref(p.name)}" class="bento-card bg-surface-container-low rounded-3xl overflow-hidden relative group cursor-pointer block">
        ${bg}
        <div class="absolute inset-0 bg-black/40"></div>
        <div class="absolute inset-0 p-6 flex flex-col justify-end">
          <div class="${accents[i]} font-black text-3xl tracking-tighter">${nums[i]}</div>
          <h3 class="font-bold tracking-tight text-sm leading-tight">${p.name}</h3>
          ${statsHTML}
        </div>
      </a>`;
  }).join('');
}

// ── RENDER: PRODUCERS ─────────────────────────────────────────────────────
function renderProducers(producerMap, covers) {
  const row = document.getElementById('producers-row');
  const producers = Object.keys(producerMap);
  if (!producers.length) { document.getElementById('producers-section').style.display = 'none'; return; }
  row.innerHTML = producers.map(prod => {
    const packs = producerMap[prod];
    const firstCover = packs.map(n => covers[n]).find(Boolean);
    const ini = initials(prod);
    const avatar = firstCover
      ? `<img src="${firstCover}" alt="${prod}" class="w-full h-full object-cover rounded-full">`
      : `<span class="text-xl font-black text-on-surface-variant/60">${ini}</span>`;
    return `
    <a href="packs.html?producer=${encodeURIComponent(prod)}" class="producer-item flex flex-col items-center gap-4 min-w-[120px] cursor-pointer group">
      <div class="producer-ring w-24 h-24 rounded-full overflow-hidden bg-surface-container-high flex items-center justify-center p-1">
        ${avatar}
      </div>
      <div class="text-center">
        <span class="producer-label text-xs font-bold uppercase tracking-widest text-on-surface-variant transition-colors block">${prod}</span>
        <span class="text-[10px] text-on-surface-variant/50">${packs.length} pack${packs.length!==1?'s':''}</span>
      </div>
    </a>`;
  }).join('');
}

// ── RENDER: VAULT ─────────────────────────────────────────────────────────
function renderVault(packs, covers) {
  const section = document.getElementById('vault-section');
  const grid    = document.getElementById('vault-grid');
  grid.innerHTML = packs.slice(0,4).map(p => `
    <a href="${packHref(p.pack_name)}" class="vault-card bg-surface-container-highest/50 backdrop-blur-md p-6 rounded-3xl border border-outline-variant/10 group cursor-pointer block">
      <div class="aspect-square rounded-xl overflow-hidden mb-4 bg-surface-container-high">
        ${coverEl(covers[p.pack_name], p.pack_name, 'vault-img')}
      </div>
      <h4 class="font-bold text-sm">${p.pack_name}</h4>
      <p class="text-[10px] text-secondary font-bold uppercase tracking-widest mt-1">Free Download</p>
    </a>`).join('');
  section.style.display = '';
}

// ── MAIN ──────────────────────────────────────────────────────────────────
async function fetchWithRetry(url, retries = 4, delayMs = 6000) {
  for (let i = 0; i < retries; i++) {
    try {
      const r = await fetch(url);
      if (r.ok) return r;
      throw new Error('HTTP ' + r.status);
    } catch(e) {
      if (i === retries - 1) throw e;
      const msg = `Backend waking up… (${i+1}/${retries})`;
      const sub = document.getElementById('latest-sub');
      if (sub) sub.textContent = msg;
      console.warn(msg, e);
      await new Promise(res => setTimeout(res, delayMs));
    }
  }
}

async function loadPage() {
  let products = [], covers = {};

  try {
    document.getElementById('latest-sub').textContent = 'Loading…';
    const r = await fetchWithRetry(API + '/api/pack-products');
    products = await r.json();
    if (!Array.isArray(products)) products = [];
  } catch(e) {
    console.error('pack-products failed:', e);
    document.getElementById('latest-sub').textContent = 'Failed to load — backend may be sleeping, refresh in 30s';
    return;
  }

  console.log('✅ products:', products.length, products);

  // Build covers: first from pack_products.cover_url, then fallback to /api/pack-covers
  products.forEach(p => { if (p.cover_url) covers[p.pack_name] = p.cover_url; });

  const missingCovers = products.filter(p => !covers[p.pack_name]);
  if (missingCovers.length) {
    try {
      const cr = await fetch(API + '/api/pack-covers');
      if (cr.ok) {
        const extraCovers = await cr.json();
        Object.assign(covers, extraCovers);
      }
    } catch(e) { console.warn('pack-covers fallback failed:', e); }
  }

  // ① Spotlight: featured → "Minimal Bass" → first product
  const spotlight = products.find(p => p.featured)
    || products.find(p => /minimal\s*bass/i.test(p.pack_name))
    || products[0];
  renderSpotlight(spotlight, covers);

  // ② Latest: all non-free, sorted by created_at (already from API)
  const latest = products.filter(p => Number(p.price_usd) > 0 || p.price_usd == null);
  renderLatest(latest.length ? latest : products, covers);

  // ③ Trending: fetch pack-stats, score = plays + downloads×3, top 5
  let packStats = {};
  try {
    const sr = await fetch(API + '/api/pack-stats');
    if (sr.ok) packStats = await sr.json();
  } catch(e) { console.warn('pack-stats failed:', e); }

  const allPackNames = new Set([...products.map(p => p.pack_name), ...Object.keys(packStats)]);
  let trending = [...allPackNames]
    .map(name => ({
      name,
      plays:     (packStats[name]?.plays     || 0),
      downloads: (packStats[name]?.downloads || 0),
      score:     (packStats[name]?.plays     || 0) + (packStats[name]?.downloads || 0) * 3,
    }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 5);
  renderTrending(trending, covers);

  // ④ Producers
  const producerMap = {};
  products.forEach(p => {
    const prod = p.producer || 'GPE';
    if (!producerMap[prod]) producerMap[prod] = [];
    producerMap[prod].push(p.pack_name);
  });
  renderProducers(producerMap, covers);

  // ⑤ Vault: price_usd = 0
  const free = products.filter(p => Number(p.price_usd) === 0);
  if (free.length) renderVault(free, covers);
}

loadPage();
</script>
